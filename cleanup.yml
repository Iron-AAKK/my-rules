name: 仓库大扫除 (手动触发)
on:
  workflow_dispatch: # 只允许你手动点击运行

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: 彻底清空旧规则文件
        run: |
          # 删除所有生成的规则相关文件
          rm -f *.list
          rm -f *.yaml
          rm -f *.srs
          rm -f *.json
          
          # 检查是否有文件被删除了
          ls -R
          
      - name: 提交并推送空仓库状态
        run: |
          git config --global user.name "Cleanup-Bot"
          git config --global user.email "bot@github.com"
          git add .
          # 如果仓库已经空了，commit 会报错，这里用 || exit 0 忽略
          git commit -m "大扫除完成：清理所有旧规则文件 [$(date +'%Y-%m-%d')]" || exit 0
          git push origin main
