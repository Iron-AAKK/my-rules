name: 2.8-MRS 终极硬核自检
on:
  workflow_dispatch: 

jobs:
  hard_check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 准备质检工具
        run: |
          # 下载 1.11.0 稳定版 sing-box
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz && cp sing-box-*/sing-box ./ && chmod +x sing-box

      - name: 二进制反向解构验证
        run: |
          echo "=== 开始对 mrs_bins 进行物理层级校验 ==="
          
          check_file() {
            local f="mrs_bins/$1.mrs"
            if [ -f "$f" ]; then
              echo "正在反解验证: $f"
              # 关键：尝试反解。如果二进制受损，这里会立即返回非 0 状态码并报错
              ./sing-box rule-set decompile "$f" > /dev/null
              echo "✅ $1.mrs 物理结构 100% 合法，确认可用。"
            else
              echo "❌ 失败：未发现 $f"
              exit 1
            fi
          }

          # 验证所有核心和扩展产物
          for name in futu moomoo itiger ibkr longbridge schwab snowball-x tradingview; do
            check_file "$name"
          done
          
          echo "=== 验收通过：所有二进制文件均符合 OpenClash 标准规格 ==="
