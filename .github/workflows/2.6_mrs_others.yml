name: 2.6-扩展MRS测试(Others)
on:
  workflow_dispatch: 

jobs:
  test_others_mrs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 准备隔离环境
        run: |
          mkdir -p mrs_bins
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz && cp sing-box-*/sing-box ./ && chmod +x sing-box

      - name: 稳健编译扩展名单
        run: |
          # 针对所有其他的 list 进行遍历
          for name in itiger schwab snowball-x ibkr longbridge tradingview; do
            if [ -f "${name}.list" ]; then
              echo "正在处理: ${name}.list"
              echo '{"version":1,"rules":[{"domain_suffix":[' > temp.json
              sed 's/^\+\.//' "${name}.list" | sed 's/^/"/;s/$/",/' | sed '$ s/,$//' >> temp.json
              echo ']}]}' >> temp.json
              ./sing-box rule-set compile temp.json -o "mrs_bins/${name}.mrs"
              rm temp.json
            fi
          done

      - name: 提交产物
        run: |
          git config --global user.name "MRS-Others-Bot"
          git config --global user.email "bot@github.com"
          git add mrs_bins/*.mrs
          git commit -m "扩展 MRS 测试产物更新 [$(date +'%Y-%m-%d')]" || exit 0
          git push origin main
