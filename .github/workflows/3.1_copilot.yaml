name: 3.1_Fetch_Copilot_list_srs_yaml

# =================================================================
# 脚本功能：自动提取并编译 Microsoft Copilot 专用规则集
# 运行说明：每周五 UTC 17:40 (北京时间周六 01:40) 运行
# 客户要求：
# 1. 精准分流：微软服务（Office, OneDrive, Bing搜索等）全部直连，仅 Copilot 代理。
# 2. 安全合规：确保“微软账户-安全-登录活动”显示为中国本地 IP。
# =================================================================

on:
  schedule:
    - cron: '40 17 * * 5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装编译器
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz && cp sing-box-*/sing-box ./ && chmod +x sing-box

      - name: 生产 Copilot 核心地基
        run: |
          mkdir -p temp
          # 1. 定义核心 AI 特征词
          echo "sydney.bing.com,copilot,bingviz,githubcopilot,copilot-edge" | tr ',' '\n' > temp/features

          # 2. 注入手动精准列表
          # 注意：EOF 必须顶格写，后面不能有空格
          cat <<EOF > temp/raw
copilot.microsoft.com
copilot.cloud.microsoft
copilot.com
copilot.ai
sydney.bing.com
bingapis.com
edgeservices.bing.com
githubcopilot.com
api.githubcopilot.com
copilot-proxy.githubusercontent.com
github-cloud.s3.amazonaws.com
dictation.microsoft.com
EOF
          
          # 3. 动态扫描权威源
          declare -a upstream_sources=(
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.yaml"
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/bing.yaml"
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.yaml"
            "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/master/geosite/category-ai-!cn.txt"
          )

          for url in "${upstream_sources[@]}"; do
            curl -sL --retry 3 --fail "$url" | grep -iEf temp/features >> temp/raw || echo "跳过源: $url"
          done

          # 4. 强效清洗（剔除身份验证，确保登录 IP 为中国）
          grep -oE "([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}" temp/raw | \
          grep -ivE "login|account|auth|password|registration|profile|msa\.|passport|signup|signin|identity|2fa|verify|verification" | \
          grep -ivE "^bing\.com$|^microsoft\.com$|^live\.com$|^office\.com$|^onedrive\.com$|^outlook\.com$|^skype\.com$|^msn\.com$|^windows\.com$|^visualstudio\.com$|^azure\.com$" | \
          grep -ivE "assets|static|res\.microsoft|telemetry|selfservehost|browser\.events|connectivity" | \
          sort -u | sed 's/^/+./' > copilot.list

          # 5. 生成 YAML
          echo "payload:" > copilot.yaml
          sed 's/^/  - /' copilot.list >> copilot.yaml

          # 6. 编译 SRS
          echo '{"version":1,"rules":[{"domain_suffix":[' > temp/m.json
          sed 's/^\+\.//' copilot.list | sed 's/^/"/;s/$/",/' | sed '$ s/,$//' >> temp/m.json
          echo ']}]}' >> temp/m.json
          ./sing-box rule-set compile temp/m.json -o copilot.srs
          rm -rf temp

      - name: 推送规则更新
        run: |
          git config --global user.name "Copilot-Bot"
          git config --global user.email "bot@github.com"
          git add copilot.*
          git commit -m "安全加固更新 [$(date +'%Y-%m-%d')]" || exit 0
          git push origin main
