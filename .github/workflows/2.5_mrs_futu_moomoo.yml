name: 2.5-核心MRS测试(Futu-Moomoo)
on:
  workflow_dispatch: 

jobs:
  test_core_mrs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 准备隔离环境
        run: |
          # 1. 创建专门存放 MRS 的目录
          mkdir -p mrs_bins
          # 2. 下载官方编译器
          curl -Lo mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.18.9/mihomo-linux-amd64-v1.18.9.gz
          gunzip -c mihomo.gz > mihomo && chmod +x mihomo

      - name: 编译核心 MRS
        run: |
          # 循环处理核心列表
          for f in futu.list moomoo.list; do
            if [ -f "$f" ]; then
              echo "正在处理: $f"
              # 关键清洗：剥离 +. 前缀并存为临时纯净列表
              sed 's/^\+\.//' "$f" > temp_plain.txt
              
              # 使用显式输出路径，防止编译器进入交互/服务模式
              ./mihomo rule-set compile --type domain temp_plain.txt --output "mrs_bins/${f%.list}.mrs"
              
              echo "$f 转换成功。"
              rm temp_plain.txt
            else
              echo "警告：未找到 $f，请确认已运行过 2.3 脚本。"
            fi
          done

      - name: 提交到隔离目录
        run: |
          git config --global user.name "MRS-Tester-Bot"
          git config --global user.email "bot@github.com"
          # 仅推送 mrs_bins 文件夹下的产物，绝对不碰根目录
          git add mrs_bins/*.mrs
          git commit -m "隔离测试产物更新 [$(date +'%Y-%m-%d')]" || exit 0
          git push origin main
