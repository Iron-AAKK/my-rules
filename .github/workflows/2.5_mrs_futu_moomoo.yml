name: 2.5-核心MRS测试(Futu-Moomoo)
on:
  workflow_dispatch: 

jobs:
  test_core_mrs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 准备隔离环境
        run: |
          # 1. 创建专门存放 MRS 的目录，绝对不影响根目录
          mkdir -p mrs_bins
          # 2. 下载你已经跑通、证明稳定好用的 sing-box 编译器
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz && cp sing-box-*/sing-box ./ && chmod +x sing-box

      - name: 稳健编译
        run: |
          for name in futu moomoo; do
            if [ -f "${name}.list" ]; then
              echo "正在读取原材料: ${name}.list"
              
              # 1. 构造 sing-box 兼容的 JSON (沿用 2.3 脚本的成熟逻辑)
              echo '{"version":1,"rules":[{"domain_suffix":[' > temp.json
              sed 's/^\+\.//' "${name}.list" | sed 's/^/"/;s/$/",/' | sed '$ s/,$//' >> temp.json
              echo ']}]}' >> temp.json
              
              # 2. 编译成二进制，存入隔离文件夹 mrs_bins
              ././sing-box rule-set compile temp.json -o "mrs_bins/${name}.mrs"
              
              echo "✅ ${name}.mrs 已生成到隔离区。"
              rm temp.json
            else
              echo "⚠️ 跳过：根目录未发现 ${name}.list"
            fi
          done

      - name: 提交产物到隔离区
        run: |
          git config --global user.name "MRS-Stable-Bot"
          git config --global user.email "bot@github.com"
          # 关键：只添加 mrs_bins 文件夹，绝对不碰根目录的老文件
          git add mrs_bins/*.mrs
          git commit -m "MRS 隔离测试产物更新 [$(date +'%Y-%m-%d')]" || exit 0
          git push origin main
