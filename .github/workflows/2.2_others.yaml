name: 2.2_抓数据_iTiger+IBKR+etc._list+srs+yaml
on:
  schedule:
    - cron: '30 17 * * 5' # 每周五运行
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 sing-box 编译器
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz && cp sing-box-*/sing-box ./ && chmod +x sing-box

      - name: 扫荡全网并执行强制保底策略
        run: |
          process_others() {
            local name=$1
            local sources=$2
            local manual=$3
            mkdir -p temp
            
            # 1. 优先注入手动保底名单 (解决大佬源漏掉的 TradeUP/Thinkorswim/雪盈/长桥)
            echo "$manual" | tr ',' '\n' > temp/raw
            
            # 2. 抓取远程大佬源 (如果 URL 不为空)
            if [ -n "$sources" ]; then
              for url in $sources; do
                curl -sL --retry 3 --fail "$url" >> temp/raw || echo "警告：跳过失效源 $url"
              done
            fi
            
            # 3. 强力清洗：提取合法域名、去重、排除 GitHub/HTML 等干扰项
            grep -oE "([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}" temp/raw | \
            grep -ivE "404|notfound|github|html|usercontent" | sort -u | sed 's/^/+./' > ${name}.list
            
            # 4. 生成 Clash/PassWall 适用的 YAML payload
            echo "payload:" > ${name}.yaml
            sed 's/^/  - /' ${name}.list >> ${name}.yaml
            
            # 5. 生成并编译成 sing-box SRS 格式
            echo '{"version":1,"rules":[{"domain_suffix":[' > temp/m.json
            sed 's/^\+\.//' ${name}.list | sed 's/^/"/;s/$/",/' | sed '$ s/,$//' >> temp/m.json
            echo ']}]}' >> temp/m.json
            ./sing-box rule-set compile temp/m.json -o ${name}.srs
            
            rm -rf temp
          }

          # --- 分组处理开始 ---

          # 老虎证券：并入 TradeUP 海外品牌
          process_others "itiger" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/itiger.yaml" \
            "itiger.com,tradeup.com,itigerup.com,itigergrowth.com,laohu8.com,tigerbrokers.com"

          # 嘉信理财：锁定 Thinkorswim 交易终端
          process_others "schwab" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/schwab.yaml" \
            "schwab.com,schwabplan.com,thinkorswim.com,tdameritrade.com,trade.thinkorswim.com"

          # 雪球证券：【纯手动模式】彻底剔除 xueqiu.com 社区，只留交易域名
          process_others "snowball-x" \
            "" \
            "snowballsecurities.com,snowball-x.com"

          # 盈透证券
          process_others "ibkr" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/ibkr.yaml" \
            "interactivebrokers.com,ibkr.com,ibllc.com"

          # 长桥证券 (Longbridge)：包含港美股底层通讯
          process_others "longbridge" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/longbridge.yaml" \
            "longbridgeapp.com,longbridge.hk,lbkrs.com,longbridge-ny.com,longbridge.com"

          # TradingView：注入 CDN 确保图表加载速度
          process_others "tradingview" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TradingView/TradingView.yaml" \
            "tradingview.com,tvcdn.com"

      - name: 推送规则更新到仓库
        run: |
          git config --global user.name "Others-Bot"
          git config --global user.email "bot@github.com"
          git add *.list *.yaml *.srs
          git diff --quiet && git diff --staged --quiet || (git commit -m "扩展券商更新 [$(date +'%Y-%m-%d')]" && git push origin main)
