name: 自动编译自定义规则
on:
  schedule:
    - cron: '0 17 * * 5'
  workflow_dispatch:

jobs:
  build_factory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装 Sing-box 编译器
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz && cp sing-box-*/sing-box ./
          chmod +x sing-box

      - name: 3. 生产纯净规则文件
        run: |
          process_rule() {
            local name=$1
            local sources=$2
            local manual_mix=$3
            
            mkdir -p temp_dir
            
            # 先注入我们昨晚整理的“核心私货”（最高优先级）
            echo "$manual_mix" | tr ',' '\n' > temp_dir/raw_collection
            
            # 再扫荡大佬源作为地基补充
            for url in $sources; do
              if [ ! -z "$url" ]; then
                curl -sL --retry 3 --fail "$url" >> temp_dir/raw_collection || echo "跳过失效源: $url"
              fi
            done
            
            # 强化清洗：提取域名 -> 剔除 404/html/github -> 关键：去除开头的 +. 符号统一格式
            grep -oE "([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}" temp_dir/raw_collection | \
            grep -ivE "404|notfound|github|html" | \
            sed 's/^[[:space:]]*- //' | sed 's/DOMAIN-SUFFIX,//g' | \
            sed 's/DOMAIN,//g' | sed 's/["'\'']//g' | \
            tr -d '\r' | grep -v '^$' | sort -u > ${name}.list
            
            # 生成 YAML 
            echo "payload:" > ${name}.yaml && sed 's/^/  - /' ${name}.list >> ${name}.yaml
            
            # 生成 JSON 并编译 SRS
            echo '{"version": 1, "rules": [{"domain_suffix": [' > temp_dir/mid.json
            sed 's/^/"/;s/$/",/' ${name}.list | sed '$ s/,$//' >> temp_dir/mid.json
            echo ']}]}' >> temp_dir/mid.json
            ./sing-box rule-set compile temp_dir/mid.json -o ${name}.srs
            
            rm -rf temp_dir
          }

          # --- 核心生产流水线：严守 2026-03-20 整理的地基 ---

          # 1. 富途 (futu) - 目标：全直连，不掉线
          process_rule "futu" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/futu@cn.yaml https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/master/geosite/futu.txt" \
            "futunn.com,futuniuniu.com,futuesop.com,futuhk.com,futuhkapp.com,futufin.com,futuhn.com,futunn.cn,futu5.com,futu8.com,futu88.com,futunnapp.com,futu-api.com,ftimg.com,futuyun.com"

          # 2. moomoo - 目标：全代理，绕过归属地识别
          process_rule "moomoo" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/moomoo.yaml" \
            "moomoo.com,moomooequity.com,moomootrustee.com,moomoo-api.com,moomoo.jp,moomoo.com.sg,moomoo.com.au,moomoo.ca,moomoo.my,moomoo.io,moomooapp.com,moomoobull.com,moomoocdn.com,futustatic.com,futu-static.com,futuip.com,futusns.com,futuimg.com,futunnq.com,futuholdings.com,futuholding.com"

          # 3. 老虎证券 (itiger)
          process_rule "itiger" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/itiger.yaml https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TigerBrokers/TigerBrokers.yaml" \
            "itiger.com,laohu8.com,tigerbrokers.com,tradeup.com,tigerfintech.com"

          # 4. 雪盈证券 (snowball-x)
          process_rule "snowball-x" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/snowball@cn.yaml https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/master/geosite/snowball.txt" \
            "snowball-x.com,snowballsecurities.com,zhs.snowball-x.com"

      - name: 4. 自动入库推送
        run: |
          git config --global user.name "Rules-Bot"
          git config --global user.email "bot@github.com"
          rm -f *.json
          git add *.list *.yaml *.srs
          git commit -m "初心回归：锁定 03-20 Futu/Moomoo 核心地基 [$(date +'%Y-%m-%d')]" || exit 0
          git push origin main
