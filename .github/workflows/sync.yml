name: 自动编译自定义规则
on:
  schedule:
    - cron: '0 17 * * 5' # 每周六凌晨运行
  workflow_dispatch:

jobs:
  build_factory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装 Sing-box 编译器
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz && cp sing-box-*/sing-box ./
          chmod +x sing-box

      - name: 3. 生产纯净规则文件
        run: |
          # --- 核心函数：整合致谢名单中的大佬源并剔除 404 ---
          process_rule() {
            local name=$1
            local sources=$2
            local gemini_fix=$3
            
            mkdir -p temp_dir
            echo "正在处理: $name"
            
            # 【扫荡大佬】使用 --fail 拦截无效链接，防止 404 文本入库
            for url in $sources; do
              if [ ! -z "$url" ]; then
                curl -sL --retry 3 --fail "$url" >> temp_dir/raw || echo "跳过失效源: $url"
              fi
            done
            
            # 【注入基石】汇入官方必备域名
            echo "$gemini_fix" | tr ',' '\n' >> temp_dir/raw
            
            # 【地基清洗】仅保留合法域名格式，强制删除含 404/github/html 的行
            grep -oE "([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}" temp_dir/raw | \
            grep -ivE "404|notfound|github|html" | \
            sed 's/^[[:space:]]*- //' | sed 's/DOMAIN-SUFFIX,//g' | \
            sed 's/DOMAIN,//g' | sed 's/["'\'']//g' | \
            tr -d '\r' | grep -v '^$' | sort -u > ${name}.list
            
            # 生成成品 (YAML & SRS)
            echo "payload:" > ${name}.yaml && sed 's/^/  - /' ${name}.list >> ${name}.yaml
            echo '{"version": 1, "rules": [{"domain_suffix": [' > temp_dir/m.json
            sed 's/^/"/;s/$/",/' ${name}.list | sed '$ s/,$//' >> temp_dir/m.json
            echo ']}]}' >> temp_dir/m.json
            ./sing-box rule-set compile temp_dir/m.json -o ${name}.srs
            rm -rf temp_dir
          }

          # --- 生产线：整合 Loyalsoldier, MetaCubeX, blackmatrix7 等大佬源 ---

          # 1. 富途 (futu)
          process_rule "futu" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/futu@cn.yaml https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/master/geosite/futu.txt https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Futu/Futu.yaml" \
            "futunnq.com,futuholdings.com,futustatic.com,futuup.com,futunn.com,futu5.com,futu8.com,futu88.com,futunnapp.com"

          # 2. 老虎证券 (itiger)
          process_rule "itiger" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/itiger.yaml https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TigerBrokers/TigerBrokers.yaml https://raw.githubusercontent.com/gaoyifan/v2ray-rules-dat/master/geosite/itiger.txt" \
            "itiger.com,laohu8.com,tigerbrokers.com,tradeup.com,tigerfintech.com"

          # 3. 雪盈证券 (snowball-x)
          process_rule "snowball-x" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/snowball@cn.yaml https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/master/geosite/snowball.txt https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Snowball/Snowball.yaml" \
            "snowball-x.com,snowballsecurities.com,zhs.snowball-x.com"

          # 4. 嘉信理财 (schwab)
          process_rule "schwab" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/schwab.yaml https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Schwab/Schwab.yaml" \
            "schwab.com,thinkorswim.com,tdameritrade.com"

      - name: 4. 自动入库推送
        run: |
          git config --global user.name "Rules-Bot"
          git config --global user.email "bot@github.com"
          rm -f *.json
          git add *.list *.yaml *.srs
          git commit -m "地基整合更新：彻底修复404并聚合大佬源 [$(date +'%Y-%m-%d')]" || exit 0
          git push origin main
