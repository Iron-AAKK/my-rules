name: 自动编译自定义规则
on:
  schedule:
    - cron: '0 17 * * 5' # 北京时间周六凌晨 01:00 运行
  workflow_dispatch:

jobs:
  build_factory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装 Sing-box 编译器
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz && cp sing-box-*/sing-box ./
          chmod +x sing-box

      - name: 3. 生产纯净规则文件
        run: |
          # --- 强化洗地函数：集成 404 盾牌 ---
          process_rule() {
            local name=$1
            local sources=$2
            local manual_mix=$3
            
            mkdir -p temp_dir
            echo "正在深度扫荡: $name"
            
            # 【大佬抓取】加入 --fail 参数，遇 404 直接跳过，不写入文件
            for url in $sources; do
              if [ ! -z "$url" ]; then
                echo "尝试抓取源: $url"
                curl -sL --retry 3 --fail "$url" >> temp_dir/raw_collection || echo "警告：该源已失效，已自动剔除。"
              fi
            done
            
            # 【Gemini 注入】汇入官方基石域名
            echo "$manual_mix" | tr ',' '\n' >> temp_dir/raw_collection
            
            # 【核心清洗逻辑】
            # 1. grep -oE: 仅提取符合域名格式的字符串（彻底排除 404 页面文字）
            # 2. grep -iv: 强制剔除包含 "404" 或 "notfound" 的任何残余行
            # 3. sed: 清理规则前缀与引号
            grep -oE "([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}" temp_dir/raw_collection | \
            grep -ivE "404|notfound|github|html" | \
            sed 's/^[[:space:]]*- //' | sed 's/DOMAIN-SUFFIX,//g' | \
            sed 's/DOMAIN,//g' | sed 's/["'\'']//g' | \
            tr -d '\r' | grep -v '^$' | sort -u > ${name}.list
            
            # 生成 YAML 
            echo "payload:" > ${name}.yaml && sed 's/^/  - /' ${name}.list >> ${name}.yaml
            
            # 生成 JSON 并编译 SRS
            echo '{"version": 1, "rules": [{"domain_suffix": [' > temp_dir/mid.json
            sed 's/^/"/;s/$/",/' ${name}.list | sed '$ s/,$//' >> temp_dir/mid.json
            echo ']}]}' >> temp_dir/mid.json
            ./sing-box rule-set compile temp_dir/mid.json -o ${name}.srs
            
            rm -rf temp_dir
          }

          # --- 整合致谢名单中的大佬地基 ---

          # 1. 富途 (futu) - 整合 MetaCubeX, Loyalsoldier, SukkaW, blackmatrix7
          process_rule "futu" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/futu@cn.yaml https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/master/geosite/futu.txt https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Futu/Futu.yaml https://raw.githubusercontent.com/SukkaW/Surge/master/Rules/Custom/Futu.list" \
            "futunnq.com,futuholdings.com,futustatic.com,futusns.com,futuimg.com,futuup.com,futuhk.com,futunn.com,futu5.com,futu8.com,futu88.com,futunnapp.com,futu-api.com,ftimg.com,futuyun.com"

          # 2. moomoo (富途国际版)
          process_rule "moomoo" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/moomoo.yaml https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Moomoo/Moomoo.yaml" \
            "moomoo.com,moomooequity.com,moomootrustee.com,moomoo-api.com,moomoo.jp,moomoo.com.sg,moomoo.com.au,moomoo.ca,moomoo.my,moomoo.io,moomooapp.com,moomoobull.com,moomoocdn.com"

          # 3. 老虎证券 (itiger) - 整合 blackmatrix7, gaoyifan, MetaCubeX
          process_rule "itiger" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/itiger.yaml https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TigerBrokers/TigerBrokers.yaml https://raw.githubusercontent.com/gaoyifan/v2ray-rules-dat/master/geosite/itiger.txt" \
            "itiger.com,laohu8.com,tigerbbs.cn,tigerbbs.com,tigerfintech.com,xiaohu8.com,itigerup.com,tigerbrokers.com,tradeup.com"

          # 4. 雪盈证券 (snowball-x) - 整合 MetaCubeX, Loyalsoldier
          process_rule "snowball-x" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/snowball@cn.yaml https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/master/geosite/snowball.txt https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Snowball/Snowball.yaml" \
            "snowball-x.com,zhs.snowball-x.com,snowballsecurities.com"

          # 5. 长桥证券 (longbridge) - 整合 v2fly, MetaCubeX
          process_rule "longbridge" \
            "https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/longbridge https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/longbridge.list" \
            "longbridge.hk,longbridge.sg,longbridge.com,longportapp.com,longbridge.cloud,longbridgeapp.com,lbctrl.com,lbkrs.com"

          # 6. 嘉信理财 (schwab) - 整合 MetaCubeX, blackmatrix7
          process_rule "schwab" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/schwab.yaml https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Schwab/Schwab.yaml" \
            "schwab.com,thinkorswim.com,tdameritrade.com,trade.thinkorswim.com"

          # 7. 盈透证券 (ibkr) - 整合 MetaCubeX, Loyalsoldier
          process_rule "ibkr" \
            "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/ibkr.yaml https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/master/geosite/ibkr.txt" \
            "interactivebrokers.com,ibkr.com"

      - name: 4. 自动入库推送
        run: |
          git config --global user.name "Rules-Bot"
          git config --global user.email "bot@github.com"
          rm -f *.json
          git add *.list *.yaml *.srs
          git commit -m "地基级多源整合（404 强效过滤）: [$(date +'%Y-%m-%d')]" || exit 0
          git push origin main
