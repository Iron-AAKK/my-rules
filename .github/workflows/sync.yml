name: 自动编译规则文件 (LIST/YAML/SRS)
on:
  schedule:
    - cron: '0 17 * * 5' 
  workflow_dispatch:

jobs:
  build_factory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装 Sing-box 编译器
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz && cp sing-box-*/sing-box ./
          chmod +x sing-box

      - name: 3. 生产文件 (Futu & Moomoo)
        run: |
          # 抓取原始情报
          curl -s https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/futu@cn.yaml -o s1.yaml
          curl -s https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Futu.yaml -o s3.yaml
          
          # === 处理 FUTU (地基清洗) ===
          grep -hE "^\s+- " s1.yaml s3.yaml | sed 's/^[[:space:]]*- //' | sed 's/["'\'']//g' | tr -d '\r' | grep -v '^$' | sort -u > futu.list
          echo "payload:" > futu.yaml && sed 's/^/  - /' futu.list >> futu.yaml
          echo '{"version": 1, "rules": [{"domain_suffix": [' > futu.json
          sed 's/^/"/;s/$/",/' futu.list | sed '$ s/,$//' >> futu.json
          echo ']}]}' >> futu.json
          ./sing-box rule-set compile futu.json -o futu.srs

          # === 处理 MOOMOO (含私货) ===
          cat <<EOF > moomoo.list
          moomoo.com
          moomoo-api.com
          moomoocdn.com
          futustatic.com
          futusns.com
          futuimg.com
          futunnq.com
          moomoo.jp
          moomoo.com.sg
          moomootrustee.com
          futuholdings.com
          futuip.com
          EOF
          echo "payload:" > moomoo.yaml && sed 's/^/  - /' moomoo.list >> moomoo.yaml
          echo '{"version": 1, "rules": [{"domain_suffix": [' > moomoo.json
          sed 's/^/"/;s/$/",/' moomoo.list | sed '$ s/,$//' >> moomoo.json
          echo ']}]}' >> moomoo.json
          ./sing-box rule-set compile moomoo.json -o moomoo.srs

      - name: 4. 自动入库推送
        run: |
          git config --global user.name "Rules-Bot"
          git config --global user.email "bot@github.com"
          git add futu.* moomoo.*
          git commit -m "规则更新: $(date +'%Y-%m-%d')" || exit 0
          git push origin main
