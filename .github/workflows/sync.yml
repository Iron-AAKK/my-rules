name: 仓库大扫除 (一键清空旧文件)
on: 
  workflow_dispatch: # 手动触发

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 执行强力清理
        run: |
          # 删除所有 .json, .yaml, .list, .srs, .txt 文件
          # 但保留 .github 文件夹和 README.md
          find . -maxdepth 1 -type f -name "*.json" -delete
          find . -maxdepth 1 -type f -name "*.yaml" -delete
          find . -maxdepth 1 -type f -name "*.list" -delete
          find . -maxdepth 1 -type f -name "*.srs" -delete
          find . -maxdepth 1 -type f -name "*.txt" -delete
          
          git config --global user.name "Cleanup-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "🧹 自动大扫除：清理所有旧规则文件" || exit 0
          git push origin main
