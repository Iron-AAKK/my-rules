name: 3.3_自动质检_mrs_完整性
on:
  workflow_run:
    workflows: ["3.2-others-MRS生成"]
    types:
      - completed
  workflow_dispatch:

jobs:
  hard_check:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备质检员
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz && cp sing-box-*/sing-box ./ && chmod +x sing-box
      - name: 深度扫描验证
        run: |
          echo "=== 开始对根目录所有 MRS 进行物理层级校验 ==="
          verify_mrs() {
            if [ -f "$1" ]; then
              echo "正在校验: $1"
              ./sing-box rule-set decompile "$1" > /dev/null
              echo "✅ $1 物理结构 100% 合法。"
            fi
          }
          for file in *.mrs; do
            verify_mrs "$file"
          done
          echo "=== 验收通过：当前仓库所有 MRS 文件均可安全使用 ==="
