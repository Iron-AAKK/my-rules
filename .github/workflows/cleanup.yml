name: DEBUG-仓库强制清空
on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4
      
      - name: 2. 彻底清空旧规则文件
        run: |
          # 删除根目录下所有生成的规则相关文件，不影响 .github 文件夹
          rm -f *.list
          rm -f *.yaml
          rm -f *.srs
          rm -f *.json
          
      - name: 3. 提交并推送空仓库状态
        run: |
          git config --global user.name "Cleanup-Bot"
          git config --global user.email "bot@github.com"
          git add .
          # 如果没有文件变动，commit 会跳过而不会报错
          git commit -m "大扫除完成：清理所有旧规则文件 [$(date +'%Y-%m-%d')]" || exit 0
          git push origin main
